services:
  pay-service:
    build: .
    container_name: pay-service
    restart: unless-stopped
    env_file: .env
    ports:
      - "8099:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - internal
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - vilnopay_static:/data/static
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: pay-service-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"

  postgres:
    image: postgres:16-alpine
    container_name: pay-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vilnopay
      POSTGRES_USER: vilnopay
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vilnopay -d vilnopay"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  redis_data:
  pg_data:
  vilnopay_static:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
    internal: true
