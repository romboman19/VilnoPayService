services:
  pay-service:
    build: .
    container_name: pay-service
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8099:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - proxy
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: pay-service-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"

volumes:
  redis_data:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
    internal: true